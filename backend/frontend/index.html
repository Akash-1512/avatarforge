<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>contentforge — the cutting room</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  :root{
    /* cinema grading-suite palette: cool blue-black room, warm projector light */
    --base:#0E1014; --surface:#161A20; --surface-2:#1F242C; --border:#2C333D;
    --ember:#F5A623; --ember-dim:#6e5526; --hot:#FFD98A;     /* projector amber */
    --beam:#39C2C9;                                          /* in-progress / live signal */
    --done:#5FD08A; --fail:#E06A5C; --idle:#525a66;
    --text:#EDEEF2; --muted:#9aa3b0; --faint:#5f6873;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
    --display:'Fraunces',Georgia,serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--base);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
  body{background-image:radial-gradient(1100px 460px at 78% -12%,rgba(245,166,35,.07),transparent 62%)}
  a{color:var(--ember);text-decoration:none}
  button{font-family:var(--sans);cursor:pointer}
  input,select,textarea{font-family:var(--sans);font-size:14px}
  ::selection{background:rgba(245,166,35,.28)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  /* top bar */
  .topbar{border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;
    background:rgba(14,16,20,.84);backdrop-filter:blur(10px)}
  .topbar .wrap{display:flex;align-items:center;gap:24px;height:60px}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:600;
    font-size:20px;letter-spacing:-.01em}
  .anvil{width:24px;height:24px;flex:none}
  .nav{display:flex;gap:2px;margin-left:4px;flex-wrap:wrap}
  .nav button{background:none;border:0;color:var(--muted);font-size:13.5px;font-weight:500;
    padding:7px 12px;border-radius:7px}
  .nav button:hover{color:var(--text)}
  .nav button.on{color:var(--base);background:var(--ember)}
  .nav .sep{width:1px;height:20px;background:var(--border);margin:0 6px;align-self:center}
  .ver{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}

  h1.eyebrow{font-family:var(--mono);font-weight:500;font-size:12px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ember);margin:34px 0 7px}
  .lede{font-family:var(--display);font-weight:500;font-size:30px;letter-spacing:-.01em;
    margin:0 0 26px;max-width:720px;line-height:1.18}
  .lede .mut{color:var(--muted)}

  /* hero (landing strip above the active view) */
  .hero{position:relative;border:1px solid var(--border);border-radius:18px;overflow:hidden;
    background:linear-gradient(135deg,#12151b 0%,#0E1014 60%);margin:30px 0 8px;padding:40px 38px}
  .hero .sprocket{position:absolute;inset:0 0 auto 0;height:14px;display:flex;gap:10px;
    padding:4px 14px;opacity:.5}
  .hero .sprocket i{width:18px;height:6px;margin-top:3px;background:var(--border);border-radius:2px;flex:none}
  .hero h2{font-family:var(--display);font-weight:600;font-size:42px;line-height:1.05;
    letter-spacing:-.02em;margin:10px 0 14px;max-width:760px}
  .hero h2 em{font-style:italic;color:var(--ember)}
  .hero p{color:var(--muted);font-size:16px;max-width:560px;margin:0 0 22px}
  .hero .cta{display:flex;gap:10px;flex-wrap:wrap}
  .hero .pill{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--beam);border:1px solid var(--border);border-radius:20px;padding:5px 12px}
  .hero .beam{position:absolute;right:-60px;top:-40px;width:300px;height:300px;
    background:radial-gradient(circle,rgba(57,194,201,.12),transparent 65%);pointer-events:none}

  /* studio grid */
  .studio{display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:22px;
    align-items:start;padding-bottom:60px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
  .panel h3{font-family:var(--display);font-weight:500;font-size:14px;margin:0 0 16px;
    letter-spacing:.01em;color:var(--text)}

  .seg{display:flex;background:var(--base);border:1px solid var(--border);border-radius:9px;
    padding:3px;margin-bottom:18px}
  .seg button{flex:1;background:none;border:0;color:var(--muted);font-size:13px;font-weight:500;
    padding:8px;border-radius:6px}
  .seg button.on{background:var(--surface-2);color:var(--text)}

  label.fl{display:block;font-size:12px;color:var(--muted);margin:14px 0 5px;font-weight:500}
  label.fl:first-of-type{margin-top:0}
  .inp,.sel,.ta{width:100%;background:var(--base);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:9px 11px;outline:none}
  .inp:focus,.sel:focus,.ta:focus{border-color:var(--ember);box-shadow:0 0 0 3px rgba(255,138,61,.13)}
  .ta{resize:vertical;min-height:74px;line-height:1.5}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .drop{border:1.5px dashed var(--border);border-radius:10px;padding:18px;text-align:center;
    color:var(--muted);font-size:13px;cursor:pointer;transition:border-color .15s,background .15s}
  .drop:hover{border-color:var(--ember-dim);background:var(--base)}
  .drop.has{border-style:solid;border-color:var(--ember-dim);padding:10px}
  .thumb{width:100%;max-height:140px;object-fit:contain;border-radius:6px}

  .btns{display:flex;gap:10px;margin-top:18px}
  .btn{border:1px solid var(--border);background:var(--surface-2);color:var(--text);
    padding:10px 15px;border-radius:9px;font-weight:600;font-size:14px;flex:1}
  .btn:hover{border-color:var(--muted)}
  .btn.primary{background:var(--ember);border-color:var(--ember);color:#2a1606}
  .btn.primary:hover{background:var(--hot);border-color:var(--hot)}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .plan{margin-top:16px;background:var(--base);border:1px solid var(--border);border-radius:10px;
    padding:14px;font-size:13px}
  .plan .pr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--border)}
  .plan .pr:last-child{border:0}
  .plan .k{color:var(--muted)} .plan .v{font-family:var(--mono);color:var(--text)}
  .plan .why{margin-top:10px;color:var(--muted);font-style:italic;line-height:1.45}

  /* the forge: pipeline signature */
  .forge{min-height:340px;display:flex;flex-direction:column}
  .stage-photo{display:flex;gap:16px;align-items:center;margin-bottom:22px}
  .stage-photo img{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid var(--border)}
  .stage-photo .ph{width:64px;height:64px;border-radius:10px;border:1px dashed var(--border);
    display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:11px;text-align:center}
  .jobmeta{font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.7}
  .jobmeta .id{color:var(--text)}

  .track{display:flex;align-items:flex-start;margin:8px 0 26px;padding:0 4px}
  .station{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative}
  .node{width:46px;height:46px;border-radius:12px;border:1.5px solid var(--border);
    background:var(--surface);display:flex;align-items:center;justify-content:center;
    transition:all .4s ease;position:relative;z-index:2}
  .node svg{width:22px;height:22px;stroke:var(--idle);transition:stroke .4s}
  .station .nm{font-size:11.5px;color:var(--faint);margin-top:9px;font-weight:500;transition:color .4s}
  .conduit{position:absolute;top:23px;left:50%;width:100%;height:2.5px;background:var(--border);z-index:1}
  .conduit .fill{height:100%;width:0;background:linear-gradient(90deg,var(--ember),var(--hot));
    transition:width .6s ease;box-shadow:0 0 8px rgba(255,138,61,.6)}
  .station:last-child .conduit{display:none}

  .station.done .node{border-color:var(--done);background:rgba(95,208,138,.1)}
  .station.done .node svg{stroke:var(--done)}
  .station.done .nm{color:var(--done)}
  .station.done .conduit .fill{width:100%;background:var(--done);box-shadow:none}
  .station.active .node{border-color:var(--ember);background:rgba(255,138,61,.14);
    animation:heat 1.3s ease-in-out infinite}
  .station.active .node svg{stroke:var(--ember)}
  .station.active .nm{color:var(--ember)}
  .station.fail .node{border-color:var(--fail);background:rgba(224,106,92,.12)}
  .station.fail .node svg{stroke:var(--fail)}
  .station.fail .nm{color:var(--fail)}
  @keyframes heat{0%,100%{box-shadow:0 0 0 0 rgba(255,138,61,.0)}
    50%{box-shadow:0 0 0 6px rgba(255,138,61,.13),0 0 16px rgba(255,138,61,.4)}}
  @media (prefers-reduced-motion:reduce){.station.active .node{animation:none}}

  .statusline{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin-bottom:18px;
    display:flex;align-items:center;gap:9px}
  .video{width:100%;border-radius:11px;border:1px solid var(--border);background:#000;margin-top:auto}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--faint);text-align:center;gap:8px;padding:30px 0}
  .empty svg{width:38px;height:38px;stroke:var(--idle)}
  .err{background:rgba(224,106,92,.1);border:1px solid rgba(224,106,92,.35);color:#f0a89f;
    border-radius:9px;padding:11px 13px;font-size:13px;margin-top:14px;font-family:var(--mono)}

  /* dashboard */
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:17px}
  .tile .lab{font-size:12px;color:var(--muted);font-weight:500}
  .tile .big{font-family:var(--display);font-weight:700;font-size:30px;letter-spacing:-.02em;
    margin-top:7px;line-height:1}
  .tile .sub{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:6px}
  .tile .big.ember{color:var(--ember)} .tile .big.done{color:var(--done)}

  .tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);
    border-radius:13px;overflow:hidden;font-size:13px}
  .tbl thead th{text-align:left;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);font-weight:500;padding:11px 14px;
    border-bottom:1px solid var(--border);background:var(--base)}
  .tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12.5px}
  .tbl tr:last-child td{border-bottom:0}
  .tbl tr:hover td{background:var(--surface-2)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;
    padding:3px 9px;border-radius:20px;font-weight:500}
  .pill.queued{background:rgba(155,145,131,.15);color:var(--muted)}
  .pill.running{background:rgba(255,138,61,.15);color:var(--ember)}
  .pill.completed{background:rgba(95,208,138,.15);color:var(--done)}
  .pill.failed{background:rgba(224,106,92,.15);color:var(--fail)}
  .sec-h{display:flex;align-items:center;justify-content:between;gap:12px;margin:30px 0 13px}
  .sec-h h3{font-family:var(--display);font-weight:500;font-size:15px;margin:0}
  .sec-h .rf{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint)}
  .muted-empty{color:var(--faint);font-size:13px;padding:18px 0;text-align:center;font-family:var(--mono)}
  .dlq td{color:#f0a89f}
  .tbl tr.clickable{cursor:pointer}
  .tbl tr.clickable:hover td{background:var(--surface-2)}

  /* trace waterfall */
  .trace{background:var(--base);border:1px solid var(--border);border-radius:11px;padding:16px;margin:2px 0 10px}
  .trace-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .trace-head .tt{font-family:var(--display);font-size:14px}
  .trace-head .agg{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .tstage{display:grid;grid-template-columns:130px 120px 1fr 150px;gap:12px;align-items:center;
    padding:9px 0;border-top:1px solid var(--border)}
  .tstage:first-of-type{border-top:0}
  .tstage .sname{font-family:var(--display);font-size:13px}
  .tstage .prov{font-family:var(--mono);font-size:11.5px;color:var(--text)}
  .tstage .fb{display:inline-block;font-family:var(--mono);font-size:9.5px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--ember);border:1px solid var(--ember-dim);border-radius:4px;
    padding:1px 5px;margin-left:6px}
  .tstage .lbar{height:9px;background:var(--surface-2);border-radius:5px;overflow:hidden;position:relative}
  .tstage .lbar i{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--ember),var(--hot));border-radius:5px}
  .tstage.failed .lbar i{background:var(--fail)}
  .tstage .nums{font-family:var(--mono);font-size:11.5px;color:var(--muted);text-align:right}
  .tstage .nums b{color:var(--text);font-weight:500}
  .trace-err{margin-top:10px;background:rgba(224,106,92,.1);border:1px solid rgba(224,106,92,.35);
    color:#f0a89f;border-radius:8px;padding:9px 11px;font-family:var(--mono);font-size:12px}
  .trace-empty{font-family:var(--mono);font-size:12px;color:var(--faint);padding:8px 0}

  /* architecture view */
  .arch-wrap{margin-top:8px}
  .arch-svg{width:100%;height:auto;display:block;background:var(--base);
    border:1px solid var(--border);border-radius:14px}
  .arch-legend{display:flex;flex-wrap:wrap;gap:18px;margin-top:16px;
    font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .arch-legend span{display:inline-flex;align-items:center;gap:7px}
  .arch-legend i{width:13px;height:13px;border-radius:3px;display:inline-block}
  .arch-notes{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:14px;margin-top:22px}
  .arch-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:15px 16px}
  .arch-card h4{font-family:var(--display);font-size:13px;margin:0 0 7px;color:var(--hot)}
  .arch-card p{margin:0;font-size:12.5px;line-height:1.55;color:var(--muted)}
  .arch-card code{font-family:var(--mono);font-size:11.5px;color:var(--text);
    background:var(--base);padding:1px 5px;border-radius:4px}

  /* assistant chat + memory */
  .asst{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
  @media(max-width:860px){.asst{grid-template-columns:1fr}}
  .chat{background:var(--surface);border:1px solid var(--border);border-radius:14px;
    display:flex;flex-direction:column;height:520px}
  .chat-log{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:82%;padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.5}
  .msg.user{align-self:flex-end;background:var(--ember);color:#2a1606;border-bottom-right-radius:4px}
  .msg.assistant{align-self:flex-start;background:var(--surface-2);color:var(--text);
    border:1px solid var(--border);border-bottom-left-radius:4px}
  .chat-empty{margin:auto;text-align:center;color:var(--faint);font-size:13px;max-width:300px;line-height:1.6}
  .chat-bar{border-top:1px solid var(--border);padding:12px;display:flex;gap:9px}
  .chat-bar input{flex:1;background:var(--base);border:1px solid var(--border);color:var(--text);
    border-radius:9px;padding:10px 12px;font-size:13.5px}
  .chat-bar input:focus{border-color:var(--ember);outline:none}
  .chat-applied{font-family:var(--mono);font-size:10.5px;color:var(--faint);padding:0 18px 9px}
  .memcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:17px}
  .memcard h3{font-family:var(--display);font-size:13px;margin:0 0 4px;color:var(--text)}
  .memcard .sub{font-size:11px;color:var(--faint);margin:0 0 14px;line-height:1.4}
  .toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
  .toggle span{font-size:12.5px;color:var(--text)}
  .sw{width:38px;height:21px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);
    position:relative;cursor:pointer;transition:background .15s;flex:none}
  .sw.on{background:var(--ember);border-color:var(--ember)}
  .sw i{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;
    background:var(--text);transition:left .15s}
  .sw.on i{left:19px;background:#2a1606}
  .pref{margin-bottom:11px}
  .pref label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
  .pref select,.pref input{width:100%;background:var(--base);border:1px solid var(--border);
    color:var(--text);border-radius:7px;padding:6px 8px;font-size:12.5px}
  .memlist{margin-top:6px;display:flex;flex-direction:column;gap:7px}
  .memitem{display:flex;align-items:center;gap:8px;background:var(--base);border:1px solid var(--border);
    border-radius:8px;padding:7px 9px;font-size:12px}
  .memitem .k{font-family:var(--mono);font-size:10px;color:var(--ember);text-transform:uppercase}
  .memitem .v{color:var(--text)}
  .memitem .x{margin-left:auto;color:var(--faint);cursor:pointer;border:0;background:none;font-size:15px;line-height:1}
  .memitem .x:hover{color:var(--fail)}
  .memnone{font-size:12px;color:var(--faint);padding:6px 0}
  .clearall{margin-top:12px;width:100%;background:none;border:1px solid var(--border);color:var(--muted);
    border-radius:8px;padding:7px;font-size:12px;cursor:pointer}
  .clearall:hover{border-color:var(--fail);color:var(--fail)}

  /* film: storyboard + composition */
  .filmwrap{margin:8px 0 30px}
  .filmbar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
  .briefin{width:100%;background:var(--base);border:1px solid var(--border);color:var(--text);
    border-radius:9px;padding:11px 13px;font-size:14px;resize:vertical;line-height:1.45}
  .filmctrls{display:flex;gap:10px;margin-top:11px;flex-wrap:wrap}
  .filmctrls select{background:var(--base);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:8px 10px;font-size:13px}
  .filmctrls .btn.primary{margin-left:auto}
  .board{margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;
    overflow:hidden}
  .boardhead{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
  .boardhead .bt{font-family:var(--display);font-weight:600;font-size:16px}
  .boardhead .bmeta{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .boardhead .btn{margin-left:auto}
  .scenes{display:flex;flex-direction:column}
  .scene{display:flex;gap:14px;padding:13px 16px;border-bottom:1px solid var(--border)}
  .scene:last-child{border-bottom:0}
  .scene .sn{font-family:var(--mono);font-size:13px;color:var(--ember);padding-top:2px;flex:none}
  .scene .sshot{font-size:14px;color:var(--text);margin-bottom:3px}
  .scene .smeta{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .filmout{margin-top:16px}
  /* quality-loop refine panel */
  .refinepanel{margin-top:18px;border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .refinetoggle{width:100%;text-align:left;background:var(--surface);border:0;color:var(--text);
    font-family:var(--mono);font-size:12px;letter-spacing:.04em;padding:13px 16px;cursor:pointer}
  .refinetoggle:hover{color:var(--ember)}
  .refinebody{padding:0 16px 16px;background:var(--surface)}
  .refinehint{font-size:12.5px;color:var(--muted);margin:4px 0 14px;line-height:1.5}
  .refinectrls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .refinectrls input[type=text],.refinectrls>input{flex:1 1 280px;background:var(--base);
    border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-size:13px}
  .refinectrls .thr{display:flex;align-items:center;gap:7px;font-family:var(--mono);
    font-size:11px;color:var(--muted)}
  .refinectrls .thr input{accent-color:var(--ember)}
  .refineres{margin-top:16px}
  .refinesummary{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .verdict{font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:3px 9px;border-radius:6px}
  .verdict.pass{color:var(--base);background:var(--done)}
  .verdict.fail{color:var(--base);background:var(--ember)}
  .rmeta{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .attempts{display:flex;flex-direction:column;gap:8px}
  .attempt{display:flex;align-items:center;gap:11px}
  .attempt .ai{font-family:var(--mono);font-size:11px;color:var(--faint);width:24px;flex:none}
  .attempt .abar{flex:1;height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden}
  .attempt .afill{height:100%;transition:width .4s ease}
  .attempt .asc{font-family:var(--mono);font-size:11px;color:var(--text);width:34px;flex:none}
  .attempt .aiss{font-size:11px;color:var(--muted);flex:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* characters gallery */
  .charbar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:20px;
    background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
  .charbar .f{display:flex;flex-direction:column;gap:5px}
  .charbar label{font-size:11px;color:var(--muted)}
  .charbar input,.charbar select{background:var(--base);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px}
  .chargrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
  .charcard{background:var(--surface);border:1px solid var(--border);border-radius:13px;
    overflow:hidden;position:relative}
  .charcard .thumb{height:150px;background:var(--surface-2);display:flex;align-items:center;
    justify-content:center;color:var(--faint);font-size:34px}
  .charcard .meta{padding:11px 13px}
  .charcard .nm{font-family:var(--display);font-size:14px;color:var(--text);margin-bottom:4px}
  .charcard .tags{display:flex;gap:6px;flex-wrap:wrap}
  .charcard .tag{font-family:var(--mono);font-size:10px;color:var(--ember);
    border:1px solid var(--ember-dim);border-radius:5px;padding:1px 6px}
  .charcard .tag.policy{color:var(--muted);border-color:var(--border)}
  .charcard .del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.45);border:0;
    color:var(--text);width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:14px}
  .charcard .del:hover{background:var(--fail);color:#2a1606}
  .charcard .restyle{margin-top:10px;display:flex;flex-direction:column;gap:5px}
  .charcard .restyle select{background:var(--base);border:1px solid var(--border);
    color:var(--text);border-radius:7px;padding:6px 8px;font-size:12px}
  .charcard .restyle .hint{font-family:var(--mono);font-size:10px;color:var(--faint)}
  .charcard .cardE{margin-top:8px;font-size:11px;color:var(--fail);
    border:1px solid var(--fail);border-radius:6px;padding:5px 7px}
  .charempty{color:var(--faint);font-size:13px;padding:30px;text-align:center;
    background:var(--surface);border:1px dashed var(--border);border-radius:13px}

  /* library gallery */
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;padding-bottom:10px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;
    display:flex;flex-direction:column;transition:border-color .15s}
  .card:hover{border-color:var(--ember-dim)}
  .card-vid{width:100%;aspect-ratio:1/1;object-fit:cover;background:#000;display:block}
  .card-body{padding:14px}
  .card-title{font-family:var(--display);font-weight:500;font-size:15px;line-height:1.3;margin-bottom:9px}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tag{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;
    color:var(--muted);background:var(--base);border:1px solid var(--border);border-radius:5px;padding:2px 7px}
  .card-date{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:auto}
  .script-toggle{margin-top:12px;background:none;border:0;color:var(--ember);font-size:13px;
    font-weight:500;padding:0;font-family:var(--sans)}
  .script-toggle:hover{color:var(--hot)}
  .script-text{margin-top:10px;padding:12px;background:var(--base);border:1px solid var(--border);
    border-radius:9px;font-size:13.5px;line-height:1.6;color:var(--text);white-space:pre-wrap;
    max-height:200px;overflow:auto}
  @media(max-width:880px){.studio{grid-template-columns:1fr}.tiles{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;
const API = "/api/v1";

const STAGES = [
  { key: "script",  label: "Script",  icon: "M4 6h16M4 12h16M4 18h10" },
  { key: "tts",     label: "Voice",   icon: "M12 3v18M8 7v10M16 7v10M4 10v4M20 10v4" },
  { key: "avatar",  label: "Avatar",  icon: "M12 13a4 4 0 100-8 4 4 0 000 8zM4 21a8 8 0 0116 0" },
  { key: "store",   label: "Package", icon: "M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8" },
];
// stage value reported by the pipeline -> index in STAGES
const STAGE_IX = { script:0, tts:1, avatar:2, store:3, notify:3, package:3 };

function api(path, opts) {
  return fetch(API + path, opts).then(async r => {
    const body = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(body.detail || `${r.status} ${r.statusText}`);
    return body;
  });
}

function Anvil() {
  // film-frame mark: a frame with sprocket holes + a centre aperture
  return (
    <svg className="anvil" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="4" width="18" height="16" rx="2.4" stroke="#F5A623" strokeWidth="1.6"/>
      <rect x="5.4" y="6.2" width="2" height="2" rx=".5" fill="#F5A623"/>
      <rect x="5.4" y="15.8" width="2" height="2" rx=".5" fill="#F5A623"/>
      <rect x="16.6" y="6.2" width="2" height="2" rx=".5" fill="#F5A623"/>
      <rect x="16.6" y="15.8" width="2" height="2" rx=".5" fill="#F5A623"/>
      <circle cx="12" cy="12" r="3.1" stroke="#39C2C9" strokeWidth="1.6"/>
    </svg>
  );
}

// ---- the forge: live pipeline track ----
function Forge({ image, job }) {
  const status = job?.status;
  const stage = job?.current_stage;
  const activeIx = stage != null ? (STAGE_IX[stage] ?? -1) : -1;
  const done = status === "completed";
  const failed = status === "failed";

  const stationClass = (i) => {
    if (failed && i === activeIx) return "station fail";
    if (done) return "station done";
    if (i < activeIx) return "station done";
    if (i === activeIx && status === "running") return "station active";
    return "station";
  };

  return (
    <div className="forge">
      <div className="stage-photo">
        {image ? <img src={image} alt="source" /> : <div className="ph">no photo</div>}
        <div className="jobmeta">
          {job ? <>
            <div>job <span className="id">{job.job_id?.slice(0,12)}…</span></div>
            <div>engine {job.engine || "—"} · {job.language || "en"}</div>
          </> : <div>compose a job to begin</div>}
        </div>
      </div>

      <div className="track">
        {STAGES.map((s, i) => (
          <div key={s.key} className={stationClass(i)}>
            <div className="conduit"><div className="fill" /></div>
            <div className="node">
              <svg viewBox="0 0 24 24" fill="none" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d={s.icon}/></svg>
            </div>
            <div className="nm">{s.label}</div>
          </div>
        ))}
      </div>

      {job && (
        <div className="statusline">
          <span className="dot" style={{background: failed?"var(--fail)":done?"var(--done)":"var(--ember)"}}/>
          {done ? "forged — video ready"
            : failed ? `failed at ${stage || "?"}`
            : `${status || "queued"}${stage ? " · " + stage : ""}`}
        </div>
      )}

      {job?.video_url
        ? <video className="video" src={job.video_url} controls autoPlay muted loop />
        : !job && (
          <div className="empty">
            <svg viewBox="0 0 24 24" fill="none" strokeWidth="1.4"><path d="M12 3v18M3 12h18"/></svg>
            <div>the pipeline lights up here as your job is forged</div>
          </div>
        )}
      {failed && job?.error_message && <div className="err">{job.error_message}</div>}
    </div>
  );
}

// ---- photo dropzone ----
function Drop({ file, onFile }) {
  const ref = useRef();
  const url = file ? URL.createObjectURL(file) : null;
  return (
    <div className={"drop" + (file ? " has":"")} onClick={() => ref.current.click()}
      onDragOver={e=>e.preventDefault()}
      onDrop={e=>{e.preventDefault(); const f=e.dataTransfer.files[0]; if(f) onFile(f);}}>
      {file ? <img className="thumb" src={url} alt="preview"/>
        : <>Drop a front-facing photo, or click to choose<br/><span style={{color:"var(--faint)"}}>PNG or JPEG · min 256px</span></>}
      <input ref={ref} type="file" accept="image/png,image/jpeg" hidden
        onChange={e=>{const f=e.target.files[0]; if(f) onFile(f);}}/>
    </div>
  );
}

// ---- studio ----
function Studio({ engines }) {
  const [mode, setMode] = useState("quick");      // quick | advanced
  const [file, setFile] = useState(null);
  const [imgUrl, setImgUrl] = useState(null);
  const [brief, setBrief] = useState("");
  const [plan, setPlan] = useState(null);
  const [form, setForm] = useState({ topic:"", tone:"professional", duration_seconds:60,
    language:"en", voice:"professional_female", engine: engines.default || "sadtalker" });
  const [job, setJob] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);
  const es = useRef(null);

  useEffect(() => () => es.current?.close(), []);
  const pickFile = (f) => { setFile(f); setImgUrl(URL.createObjectURL(f)); };

  const track = useCallback((jobId) => {
    es.current?.close();
    const source = new EventSource(`${API}/jobs/${jobId}/events`);
    es.current = source;
    source.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        setJob(j => ({ ...(j||{}), ...data, job_id: jobId }));
        if (data.status === "completed" || data.status === "failed") source.close();
      } catch {}
    };
    source.onerror = () => { source.close(); };
  }, []);

  const doPlan = async () => {
    setErr(null); setBusy(true);
    try { setPlan(await api("/videos/plan", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ brief })
    })); } catch(e){ setErr(e.message); } finally { setBusy(false); }
  };

  const submit = async () => {
    setErr(null); setBusy(true); setJob(null);
    try {
      if (!file) throw new Error("Add a photo first.");
      const fd = new FormData();
      fd.append("image", file);
      let res;
      if (mode === "quick") {
        if (brief.trim().length < 5) throw new Error("Write a brief of at least 5 characters.");
        fd.append("brief", brief);
        res = await api("/videos/from-prompt", { method:"POST", body: fd });
        setPlan(res.plan);
      } else {
        Object.entries(form).forEach(([k,v]) => fd.append(k, v));
        res = await api("/videos/generate", { method:"POST", body: fd });
      }
      const seed = { job_id: res.job_id, status:"queued",
        engine: (res.plan?.engine)||form.engine, language:(res.plan?.language)||form.language };
      setJob(seed);
      track(res.job_id);
    } catch(e){ setErr(e.message); } finally { setBusy(false); }
  };

  const up = (k,v) => setForm(f => ({...f,[k]:v}));

  return (
    <>
      <h1 className="eyebrow">create</h1>
      <p className="lede">Direct a scene.<span className="mut"> Describe it in a line, or set every dial yourself — the engine is chosen for your style and content.</span></p>
      <div className="studio">
        <div className="panel">
          <div className="seg">
            <button className={mode==="quick"?"on":""} onClick={()=>setMode("quick")}>Quick — from a brief</button>
            <button className={mode==="advanced"?"on":""} onClick={()=>setMode("advanced")}>Advanced</button>
          </div>

          {mode === "quick" ? (
            <>
              <label className="fl">What should the video say?</label>
              <textarea className="ta" value={brief} onChange={e=>setBrief(e.target.value)}
                placeholder="explain compound interest to teenagers, upbeat, 30 seconds, in Hindi" />
              <label className="fl">Photo</label>
              <Drop file={file} onFile={pickFile} />
              <div className="btns">
                <button className="btn" onClick={doPlan} disabled={busy||brief.trim().length<5}>Preview plan</button>
                <button className="btn primary" onClick={submit} disabled={busy}>Forge video</button>
              </div>
              {plan && (
                <div className="plan">
                  {["topic","tone","duration_seconds","language","voice","engine"].map(k=>(
                    <div className="pr" key={k}><span className="k">{k.replace("_seconds","")}</span><span className="v">{String(plan[k])}</span></div>
                  ))}
                  {plan.rationale && <div className="why">{plan.rationale}</div>}
                </div>
              )}
            </>
          ) : (
            <>
              <label className="fl">Topic</label>
              <input className="inp" value={form.topic} onChange={e=>up("topic",e.target.value)}
                placeholder="What the video is about" />
              <div className="row2">
                <div><label className="fl">Tone</label>
                  <select className="sel" value={form.tone} onChange={e=>up("tone",e.target.value)}>
                    {["professional","casual","enthusiastic","formal","friendly"].map(t=><option key={t}>{t}</option>)}
                  </select></div>
                <div><label className="fl">Duration (s)</label>
                  <input className="inp" type="number" min="15" max="300" value={form.duration_seconds}
                    onChange={e=>up("duration_seconds",+e.target.value)} /></div>
              </div>
              <div className="row2">
                <div><label className="fl">Language</label>
                  <select className="sel" value={form.language} onChange={e=>up("language",e.target.value)}>
                    {[["en","English"],["hi","Hindi"],["mr","Marathi"],["ta","Tamil"],["es","Spanish"],["fr","French"],["de","German"]].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select></div>
                <div><label className="fl">Voice</label>
                  <select className="sel" value={form.voice} onChange={e=>up("voice",e.target.value)}>
                    {["professional_female","professional_male","casual_female","casual_male","narrator"].map(v=><option key={v}>{v}</option>)}
                  </select></div>
              </div>
              <label className="fl">Engine</label>
              <select className="sel" value={form.engine} onChange={e=>up("engine",e.target.value)}>
                {(engines.engines||["sadtalker"]).map(v=><option key={v}>{v}</option>)}
              </select>
              <label className="fl">Photo</label>
              <Drop file={file} onFile={pickFile} />
              <div className="btns">
                <button className="btn primary" onClick={submit} disabled={busy}>Forge video</button>
              </div>
            </>
          )}
          {err && <div className="err">{err}</div>}
        </div>

        <div className="panel">
          <h3>The forge</h3>
          <Forge image={imgUrl} job={job} />
        </div>
      </div>
    </>
  );
}

// ---- per-job trace waterfall (LLMOps view) ----
function TraceWaterfall({ jobId }) {
  const [trace, setTrace] = useState(null);
  useEffect(() => {
    let live = true;
    api(`/jobs/${jobId}/trace`).then(t => { if(live) setTrace(t); }).catch(()=>setTrace({stages:[]}));
    return () => { live = false; };
  }, [jobId]);

  if (!trace) return <div className="trace"><div className="trace-empty">loading trace…</div></div>;
  const usd = (x) => "$"+Number(x||0).toFixed(4);
  const ms = (x) => x>=1000 ? (x/1000).toFixed(1)+"s" : x+"ms";

  return (
    <div className="trace">
      <div className="trace-head">
        <span className="tt">Pipeline trace</span>
        <span className="agg">{usd(trace.total_cost_usd)} · {ms(trace.total_latency_ms||0)} total</span>
      </div>
      {(!trace.stages || trace.stages.length===0) ? (
        <div className="trace-empty">No audit rows for this job yet — stages appear as the pipeline records them.</div>
      ) : trace.stages.map(st => (
        <div className={"tstage"+(st.success?"":" failed")} key={st.stage}>
          <div>
            <div className="sname">{st.label}</div>
          </div>
          <div className="prov">
            {st.provider}
            {st.fell_back && <span className="fb">fallback</span>}
          </div>
          <div className="lbar"><i style={{width: Math.max(3, st.latency_pct)+"%"}}/></div>
          <div className="nums">
            <b>{ms(st.latency_ms)}</b>
            {st.total_tokens ? ` · ${st.total_tokens} tok` : st.characters ? ` · ${st.characters} ch` : ""}
            {st.cost_usd>0 ? ` · ${usd(st.cost_usd)}` : ""}
            {st.attempts>1 ? ` · ${st.attempts} tries` : ""}
          </div>
        </div>
      ))}
      {trace.error_message && <div className="trace-err">{trace.error_type}: {trace.error_message}</div>}
    </div>
  );
}

// ---- dashboard ----
function Dashboard() {
  const [metrics, setMetrics] = useState(null);
  const [jobs, setJobs] = useState([]);
  const [dlq, setDlq] = useState([]);
  const [tick, setTick] = useState(0);
  const [openTrace, setOpenTrace] = useState(null);

  useEffect(() => {
    let live = true;
    const load = async () => {
      try {
        const [m, j, d] = await Promise.all([
          api("/metrics/summary").catch(()=>null),
          api("/jobs?limit=20").catch(()=>({jobs:[]})),
          api("/jobs-dlq").catch(()=>({entries:[]})),
        ]);
        if (!live) return;
        setMetrics(m); setJobs(j.jobs||[]); setDlq(d.entries||[]);
      } catch {}
    };
    load();
    const t = setInterval(()=>setTick(x=>x+1), 4000);
    return () => { live=false; clearInterval(t); };
  }, [tick]);

  const sumCost = (provs) => provs ? Object.values(provs).reduce((a,p)=>a+(p.cost_usd||0),0) : 0;
  const callsOf = (provs) => provs ? Object.values(provs).reduce((a,p)=>a+(p.calls||0),0) : 0;
  const rateOf = (provs) => {
    if (!provs) return null;
    const c = callsOf(provs); if (!c) return null;
    const ok = Object.values(provs).reduce((a,p)=>a+(p.calls||0)*(p.success_rate||0),0);
    return ok/c;
  };
  const llmProv = metrics?.llm_providers;
  const ttsProv = metrics?.tts_providers;
  const av = metrics?.avatar || {};
  const pct = (x) => x==null ? "—" : Math.round(x*100)+"%";
  const usd = (x) => x==null ? "$0" : "$"+Number(x).toFixed(4);
  const age = (iso) => { if(!iso) return "—"; const s=(Date.now()-new Date(iso))/1000;
    return s<60?`${s|0}s`:s<3600?`${s/60|0}m`:`${s/3600|0}h`; };

  return (
    <>
      <h1 className="eyebrow">dashboard</h1>
      <p className="lede">What the cutting room is doing.<span className="mut"> Computed from the audit tables, refreshed live.</span></p>

      <div className="tiles">
        <div className="tile"><div className="lab">Total spend</div>
          <div className="big ember">{usd(metrics?.total_cost_usd)}</div>
          <div className="sub">LLM + speech, lifetime</div></div>
        <div className="tile"><div className="lab">LLM fallback rate</div>
          <div className="big">{pct(metrics?.llm_fallback_rate)}</div>
          <div className="sub">{callsOf(llmProv)} calls · {Object.keys(llmProv||{}).length} providers</div></div>
        <div className="tile"><div className="lab">Avatar success</div>
          <div className="big done">{pct(av.success_rate)}</div>
          <div className="sub">{av.calls||0} renders · {av.avg_latency_ms||0}ms avg</div></div>
        <div className="tile"><div className="lab">Speech success</div>
          <div className="big done">{pct(rateOf(ttsProv))}</div>
          <div className="sub">{callsOf(ttsProv)} synth · {usd(sumCost(ttsProv))}</div></div>
      </div>

      <div className="sec-h"><h3>Recent jobs</h3><span className="rf">click a row for its trace · auto-refresh 4s</span></div>
      <table className="tbl">
        <thead><tr><th>job</th><th>status</th><th>stage</th><th>engine</th><th>title</th><th>age</th></tr></thead>
        <tbody>
          {jobs.length===0 && <tr><td colSpan="6" className="muted-empty">no jobs yet — forge one in the studio</td></tr>}
          {jobs.map(j=>(
            <React.Fragment key={j.job_id}>
              <tr className="clickable" onClick={()=>setOpenTrace(openTrace===j.job_id?null:j.job_id)}>
                <td>{j.job_id?.slice(0,10)}…</td>
                <td><span className={"pill "+j.status}>{j.status}</span></td>
                <td>{j.current_stage||"—"}</td>
                <td>{j.engine||"—"}</td>
                <td style={{fontFamily:"var(--sans)",color:"var(--muted)"}}>{j.script_title||"—"}</td>
                <td>{age(j.created_at)}</td>
              </tr>
              {openTrace===j.job_id && (
                <tr><td colSpan="6" style={{padding:"0 14px 6px",background:"var(--surface)"}}>
                  <TraceWaterfall jobId={j.job_id} />
                </td></tr>
              )}
            </React.Fragment>
          ))}
        </tbody>
      </table>

      {dlq.length>0 && <>
        <div className="sec-h"><h3>Dead-letter queue</h3><span className="rf">{dlq.length} stuck</span></div>
        <table className="tbl dlq">
          <thead><tr><th>job</th><th>error</th><th>when</th></tr></thead>
          <tbody>{dlq.map((e,i)=>(

        </table>
      </>}
    </>
  );
}

function Bar({ value, max, color }) {
  const w = max > 0 ? Math.max(2, Math.round((value / max) * 100)) : 0;

    <div style={{height:"100%",width:w+"%",background:color||"var(--ember)",borderRadius:4}}/></div>;

                </span>
              </div>
            );
          })}
        </div>
      )}
      <div style={{height:50}} />
    </>
  );
}

// No auth yet, so identity is a stable client id. Real auth replaces this line.
function clientId() {
  // persisted per browser so a user keeps their characters across reloads.
  // (this console is served as a normal web page, where localStorage is available;
  // falls back to an in-memory id if storage is somehow blocked.)
  try {
    let id = window.localStorage.getItem("cf_client_id");
    if (!id) {
      id = "user-" + Math.random().toString(36).slice(2, 10);
      window.localStorage.setItem("cf_client_id", id);
    }
    return id;
  } catch (e) {
    if (!window.__afUser) window.__afUser = "user-" + Math.random().toString(36).slice(2, 8);
    return window.__afUser;
  }
}

function Assistant() {
  const userId = clientId();
  const [history, setHistory] = useState([]);
  const [thread, setThread] = useState(null);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [applied, setApplied] = useState("");
  const [memKey, setMemKey] = useState(0);
  const logRef = useRef(null);

  useEffect(()=>{ logRef.current?.scrollTo(0, logRef.current.scrollHeight); }, [history]);

  const send = async () => {
    const message = input.trim();
    if (!message || busy) return;
    setBusy(true); setInput("");
    setHistory(h => [...h, {role:"user", content:message}]);
    try {
      const res = await api("/studio/chat", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ user_id:userId, message, thread_id:thread }),
      });
      setThread(res.thread_id);
      setHistory(res.history);
      setApplied(res.memory_applied || "");
      setMemKey(k=>k+1);   // refresh memory panel — it just learned
    } catch(e) {
      setHistory(h => [...h, {role:"assistant", content:"Something went wrong: "+e.message}]);
    } finally { setBusy(false); }
  };

  return (
    <div>
      <h1 className="eyebrow">Assistant</h1>
      <p className="lede">Describe a video; refine it in conversation.
        <span className="mut"> The planner remembers your style across sessions — and you decide what it keeps.</span></p>

      <div className="asst">
        <div className="chat">
          <div className="chat-log" ref={logRef}>
            {history.length===0
              ? <div className="chat-empty">Try: <em>"a 30-second product intro, friendly tone, in Hindi"</em> — then refine: <em>"make it more energetic"</em>.</div>
              : history.map((m,i)=> <div key={i} className={"msg "+m.role}>{m.content}</div>)}
          </div>
          {applied && <div className="chat-applied">applied from memory: {applied}</div>}
          <div className="chat-bar">
            <input value={input} placeholder="Describe or refine your video…"
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") send(); }} disabled={busy}/>
            <button className="btn primary" onClick={send} disabled={busy}>
              {busy ? "…" : "Send"}</button>
          </div>
        </div>
        <MemoryPanel userId={userId} refreshKey={memKey} onChange={()=>setMemKey(k=>k+1)} />
      </div>
    </div>
  );
}

    if (!file || !name.trim() || busy) return;
    setBusy(true); setErr(null);
    const fd = new FormData();
    fd.append("user_id", userId);
    fd.append("name", name.trim());
    fd.append("source_kind", kind);
    fd.append("default_style", style);
    fd.append("is_real_person", realPerson ? "true" : "false");
    fd.append("source", file);
    try {
      const r = await fetch(API + "/characters", { method:"POST", body: fd });
      const body = await r.json().catch(()=>({}));
      if (!r.ok) throw new Error(body.detail || `${r.status}`);
      setName(""); setFile(null); if (fileRef.current) fileRef.current.value = "";
      load();
    } catch(e) { setErr(e.message); } finally { setBusy(false); }
  };

  const del = (id) =>
    api(`/characters/${userId}/${id}`, {method:"DELETE"}).then(load).catch(()=>{});

  // live restyle: render a character's reference in a chosen style (real fal call)
  const [restyling, setRestyling] = useState(null);   // character id in progress
  const [previews, setPreviews] = useState({});        // id -> still url
  const [cardErr, setCardErr] = useState({});          // id -> message
  const restyle = async (id, chosenStyle) => {
    setRestyling(id); setCardErr(p=>({...p,[id]:null}));
    try {
      const fd = new FormData(); fd.append("style", chosenStyle);
      const r = await fetch(`${API}/characters/${userId}/${id}/restyle`, {method:"POST", body:fd});
      const body = await r.json().catch(()=>({}));
      if (!r.ok) throw new Error(body.detail || `${r.status}`);
      setPreviews(p=>({...p,[id]: `${API}/media/${body.still_id}`}));
    } catch(e) { setCardErr(p=>({...p,[id]: e.message})); }
    finally { setRestyling(null); }
  };

  const emoji = {realistic:"🎬", anime:"🌸", pixar:"✨", "3d":"🧊", claymation:"🟤", watercolor:"🎨"};

  return (
    <div>
      <h1 className="eyebrow">Characters</h1>
      <p className="lede">Build a reusable digital character.
        <span className="mut"> A photo, a clip, or a live capture becomes reference frames you reuse across every scene.</span></p>

      <div className="charbar">
        <div className="f" style={{flex:"1 1 160px"}}>
          <label>Name</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Aria"/>
        </div>
        <div className="f">
          <label>Source</label>
          <select value={kind} onChange={e=>setKind(e.target.value)}>
            <option value="photo">Photo</option>
            <option value="video">Video</option>
            <option value="live">Live capture</option>
          </select>
        </div>
        <div className="f">
          <label>Default style</label>
          <select value={style} onChange={e=>setStyle(e.target.value)}>
            {["realistic","anime","pixar","3d","claymation","watercolor"].map(s=>
              <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div className="f">
          <label>Real person</label>
          <select value={realPerson?"yes":"no"} onChange={e=>setRealPerson(e.target.value==="yes")}>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>
        <div className="f" style={{flex:"1 1 160px"}}>
          <label>File</label>
          <input ref={fileRef} type="file" accept="image/png,image/jpeg,video/mp4,video/quicktime"
            onChange={e=>setFile(e.target.files[0])}/>
        </div>
        <button className="btn primary" onClick={create} disabled={busy}>
          {busy ? "Ingesting…" : "Create"}</button>
      </div>
      {err && <div className="trace-err" style={{marginBottom:16}}>{err}</div>}
      {realPerson &&
        <p className="chat-applied" style={{padding:"0 2px 14px"}}>
          Real-person characters route to a reference-capable engine (Kling); Azure Sora 2 handles stylized, non-real-face scenes.
        </p>}

      {chars.length===0
        ? <div className="charempty">No characters yet — create one above. It becomes reusable across every scene and film.</div>
        : <div className="chargrid">
            {chars.map(c=>(
              <div className="charcard" key={c.id}>
                <button className="del" onClick={()=>del(c.id)} title="Delete">×</button>
                <div className="thumb">
                  {previews[c.id]
                    ? <img src={previews[c.id]} alt={`${c.name} restyled`}
                        style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    : (emoji[c.default_style] || "🎬")}
                </div>
                <div className="meta">
                  <div className="nm">{c.name}</div>
                  <div className="tags">
                    <span className="tag">{c.default_style}</span>
                    <span className="tag">{c.frame_count} frame{c.frame_count===1?"":"s"}</span>
                    <span className="tag policy">{c.is_real_person ? "real person" : "stylized"}</span>
                  </div>
                  <div className="restyle">
                    <select defaultValue={c.default_style}
                      onChange={e=>restyle(c.id, e.target.value)}
                      disabled={restyling===c.id}>
                      {["realistic","anime","pixar","3d","claymation","watercolor"].map(s=>
                        <option key={s} value={s}>{s}</option>)}
                    </select>
                    <span className="hint">
                      {restyling===c.id ? "rendering…" : "pick a style to preview"}</span>
                  </div>
                  {cardErr[c.id] && <div className="cardE">{cardErr[c.id]}</div>}
                </div>
              </div>
            ))}
          </div>}
    </div>
  );
}

// ---- film: brief -> storyboard -> multi-scene short ----
function Film() {
  const userId = clientId();
  const [brief, setBrief] = useState("");
  const [style, setStyle] = useState("anime");
  const [board, setBoard] = useState(null);
  const [chars, setChars] = useState([]);
  const [charId, setCharId] = useState("");
  const [phase, setPhase] = useState("idle");  // idle | planning | composing
  const [clipId, setClipId] = useState(null);
  const [err, setErr] = useState(null);

  useEffect(() => {
    api(`/characters/${userId}`).then(d=>setChars(d.characters||[])).catch(()=>{});
  }, [userId]);

  const plan = async () => {
    if (brief.trim().length < 3) return;
    setPhase("planning"); setErr(null); setBoard(null); setClipId(null);
    try {
      const r = await api("/director/storyboard", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ brief: brief.trim(), style }),
      });
      setBoard(r.storyboard);
    } catch(e) { setErr(e.message || "could not plan"); }
    finally { setPhase("idle"); }
  };

  const compose = async () => {
    if (!board) return;
    setPhase("composing"); setErr(null); setClipId(null);
    try {
      const r = await api("/film/compose", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ storyboard: board, character_id: charId || null }),
      });
      setClipId(r.clip_id);
    } catch(e) { setErr(e.message || "compose failed"); }
    finally { setPhase("idle"); }
  };

  // self-correcting quality loop on a single scene — the centrepiece, made visible.
  const [refineOpen, setRefineOpen] = useState(false);
  const [refinePrompt, setRefinePrompt] = useState("");
  const [threshold, setThreshold] = useState(0.85);
  const [refineRes, setRefineRes] = useState(null);
  const refine = async () => {
    if (refinePrompt.trim().length < 3) return;
    setPhase("refining"); setErr(null); setRefineRes(null);
    try {
      const r = await api("/scene/refine", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          prompt: refinePrompt.trim(), seconds: 4,
          character_id: charId || null, threshold, max_iterations: 3,
        }),
      });
      setRefineRes(r);
    } catch(e) { setErr(e.message || "refine failed"); }
    finally { setPhase("idle"); }
  };

  const total = board ? board.scenes.reduce((a,s)=>a+s.seconds,0) : 0;

  return (
    <div className="filmwrap">
      <div className="filmbar">
        <textarea className="briefin" rows={2} value={brief}
          onChange={e=>setBrief(e.target.value)}
          placeholder="Describe the short — e.g. 'a curious fox explores a neon city at night, finds a glowing door'"/>
        <div className="filmctrls">
          <select value={style} onChange={e=>setStyle(e.target.value)}>
            {["realistic","anime","pixar","3d","claymation","watercolor"].map(s=>
              <option key={s} value={s}>{s}</option>)}
          </select>
          <select value={charId} onChange={e=>setCharId(e.target.value)}>
            <option value="">No character (text-to-scene)</option>
            {chars.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <button className="btn primary" onClick={plan} disabled={phase!=="idle"}>
            {phase==="planning" ? "Directing…" : "Storyboard"}</button>
        </div>
      </div>
      {err && <div className="trace-err" style={{marginBottom:14}}>{err}</div>}

      {board &&
        <div className="board">
          <div className="boardhead">
            <span className="bt">{board.title}</span>
            <span className="bmeta">{board.style} · {board.scenes.length} scenes · {total}s</span>
            <button className="btn" onClick={compose} disabled={phase!=="idle"}>
              {phase==="composing" ? "Rendering…" : "Compose short"}</button>
          </div>
          <div className="scenes">
            {board.scenes.map((s,i)=>(
              <div className="scene" key={i}>
                <div className="sn">{String(i+1).padStart(2,"0")}</div>
                <div className="sbody">
                  <div className="sshot">{s.shot}</div>
                  <div className="smeta">{s.camera}{s.dialogue?` · “${s.dialogue}”`:""} · {s.seconds}s</div>
                </div>
              </div>
            ))}
          </div>
        </div>}

      {clipId &&
        <div className="filmout">
          <video controls src={`${API}/media/${clipId}`} style={{width:"100%",borderRadius:12}}/>
        </div>}

      <div className="refinepanel">
        <button className="refinetoggle" onClick={()=>setRefineOpen(o=>!o)}>
          {refineOpen ? "▾" : "▸"} Self-correcting scene (quality loop)
        </button>
        {refineOpen &&
          <div className="refinebody">
            <p className="refinehint">Render one scene, let a vision judge score it against your
              description, and re-render with feedback until it clears the bar — under hard
              iteration &amp; cost caps.</p>
            <div className="refinectrls">
              <input value={refinePrompt} onChange={e=>setRefinePrompt(e.target.value)}
                placeholder="e.g. a neon fox holding a red umbrella, three blue lanterns behind it"/>
              <label className="thr">threshold
                <input type="range" min="0.5" max="0.99" step="0.01" value={threshold}
                  onChange={e=>setThreshold(parseFloat(e.target.value))}/>
                <span>{threshold.toFixed(2)}</span></label>
              <button className="btn primary" onClick={refine} disabled={phase!=="idle"}>
                {phase==="refining" ? "Refining…" : "Refine"}</button>
            </div>

            {refineRes &&
              <div className="refineres">
                <div className="refinesummary">
                  <span className={refineRes.passed?"verdict pass":"verdict fail"}>
                    {refineRes.passed ? "PASSED" : "BEST EFFORT"}</span>
                  <span className="rmeta">best {refineRes.best_score} ·
                    {refineRes.iterations} iter{refineRes.iterations===1?"":"s"} ·
                    ~${refineRes.est_cost_usd}</span>
                </div>
                <div className="attempts">
                  {refineRes.attempts.map(a=>(
                    <div className="attempt" key={a.iteration}>
                      <span className="ai">#{a.iteration}</span>
                      <div className="abar"><div className="afill"
                        style={{width:`${Math.round(a.score*100)}%`,
                          background: a.score>=threshold?"var(--done)":"var(--ember)"}}/></div>
                      <span className="asc">{a.score.toFixed(2)}</span>
                      <span className="aiss">{a.issues && a.issues.length ? a.issues.join("; ") : "—"}</span>
                    </div>
                  ))}
                </div>
                <video controls src={`${API}/media/${refineRes.clip_id}`}
                  style={{width:"100%",borderRadius:12,marginTop:12}}/>
              </div>}
          </div>}
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("studio");
  const [engines, setEngines] = useState({ engines:["sadtalker"], default:"sadtalker" });
  const [health, setHealth] = useState(null);

  useEffect(() => {
    api("/avatar/engines").then(setEngines).catch(()=>{});
    api("/health").then(setHealth).catch(()=>setHealth({status:"down"}));
  }, []);

  const ok = health?.status === "ok" || health?.status === "healthy";

  return (
    <>
      <div className="topbar"><div className="wrap">
        <div className="brand"><Anvil/> contentforge</div>
        <div className="nav">
          <button className={view==="studio"?"on":""} onClick={()=>setView("studio")}>Create</button>
          <button className={view==="characters"?"on":""} onClick={()=>setView("characters")}>Characters</button>
          <button className={view==="library"?"on":""} onClick={()=>setView("library")}>Library</button>
          <span className="sep"/>
          <button className={view==="assistant"?"on":""} onClick={()=>setView("assistant")}>Assistant</button>
          <button className={view==="dashboard"?"on":""} onClick={()=>setView("dashboard")}>Dashboard</button>
          <button className={view==="monitoring"?"on":""} onClick={()=>setView("monitoring")}>Monitoring</button>
          <button className={view==="architecture"?"on":""} onClick={()=>setView("architecture")}>Pipeline</button>
        </div>
        <div className="ver">
          <span className="dot" style={{background: ok?"var(--done)":"var(--fail)"}}/>
          {ok? "api live":"api down"} · <a href="/docs">/docs</a>
        </div>
      </div></div>
      <div className="wrap">
        {view==="studio" &&
          <div className="hero">
            <div className="beam"/>
            <div className="sprocket">{Array.from({length:30}).map((_,i)=><i key={i}/>)}</div>
            <h2>A face and a sentence become a <em>scene</em>.</h2>
            <p>Build a character once, then direct it across cinematic shorts and reels —
               in any style, voiced and lip-synced, checked against your brief until it matches.</p>
            <div className="cta">
              <span className="pill">● characters</span>
              <span className="pill">● styles</span>
              <span className="pill">● scenes</span>
              <span className="pill">● quality loop</span>
            </div>
          </div>}
        {view==="studio" ? <><Film /><Studio engines={engines} /></>
          : view==="assistant" ? <Assistant />
          : view==="characters" ? <Characters />
          : view==="library" ? <Library />
          : view==="dashboard" ? <Dashboard />
          : view==="architecture" ? <Architecture engines={engines} />
          : <Monitoring />}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
