name: avatarforge

services:
  api:
    build:
      context: ./backend
    container_name: avatarforge-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://avatarforge:avatarforge@postgres:5432/avatarforge
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SADTALKER_URL=http://sadtalker:8001
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./backend:/app/backend          # hot reload in dev
      - media-data:/data/media
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
    container_name: avatarforge-worker
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://avatarforge:avatarforge@postgres:5432/avatarforge
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SADTALKER_URL=http://sadtalker:8001
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./backend:/app/backend
      - media-data:/data/media
    command: celery -A backend.workers.celery_app:celery_app worker --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./backend
    container_name: avatarforge-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    command: celery -A backend.workers.celery_app:celery_app flower --port=5555
    depends_on:
      redis:
        condition: service_healthy

  sadtalker:
    build:
      context: ./sadtalker
    container_name: avatarforge-sadtalker
    ports:
      - "8001:8001"
    volumes:
      - sadtalker-models:/models/sadtalker
    environment:
      - INFERENCE_TIMEOUT_SEC=1800
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    container_name: avatarforge-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --artifacts-destination /mlflow/artifacts --host 0.0.0.0 --port 5000 --allowed-hosts "mlflow,mlflow:*,localhost,localhost:*,127.0.0.1,127.0.0.1:*"

  postgres:
    image: postgres:16-alpine
    container_name: avatarforge-postgres
    environment:
      POSTGRES_USER: avatarforge
      POSTGRES_PASSWORD: avatarforge
      POSTGRES_DB: avatarforge
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avatarforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: avatarforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mlflow-data:
  pg-data:
  redis-data:
  media-data:
  sadtalker-models: