# Copy to 02-secret.yaml (gitignored) and fill in real values, or create directly:
#   kubectl -n avatarforge create secret generic avatarforge-secrets \
#     --from-literal=AZURE_OPENAI_API_KEY=... \
#     --from-literal=AZURE_SPEECH_KEY=... \
#     --from-literal=OPENAI_API_KEY=...
#
# Production (AKS): replace this Secret with the Azure Key Vault Provider for
# Secrets Store CSI Driver + workload identity — see docs/SECURITY.md.
apiVersion: v1
kind: Secret
metadata:
  name: avatarforge-secrets
  namespace: avatarforge
type: Opaque
stringData:
  AZURE_OPENAI_API_KEY: "REPLACE_ME"
  AZURE_SPEECH_KEY: "REPLACE_ME"
  OPENAI_API_KEY: ""
