apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-data
  namespace: avatarforge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: avatarforge
spec:
  replicas: 1   # media PVC is RWO; scaling api+worker beyond one node needs RWX/blob storage
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: avatarforge-api:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: avatarforge-config
            - secretRef:
                name: avatarforge-secrets
          volumeMounts:
            - name: media
              mountPath: /data/media
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: {cpu: 250m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media-data
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: avatarforge
spec:
  selector:
    app: api
  ports:
    - port: 8000
