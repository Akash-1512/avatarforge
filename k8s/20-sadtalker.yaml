apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sadtalker-models
  namespace: avatarforge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sadtalker
  namespace: avatarforge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sadtalker
  template:
    metadata:
      labels:
        app: sadtalker
    spec:
      containers:
        - name: sadtalker
          image: avatarforge-sadtalker:latest
          imagePullPolicy: IfNotPresent  # kind: `kind load docker-image avatarforge-sadtalker:latest`
          ports:
            - containerPort: 8001
          env:
            - name: INFERENCE_TIMEOUT_SEC
              value: "2700"
          volumeMounts:
            - name: models
              mountPath: /models/sadtalker
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: {cpu: "2", memory: 2Gi}
            limits: {cpu: "4", memory: 6Gi}
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: sadtalker-models
---
apiVersion: v1
kind: Service
metadata:
  name: sadtalker
  namespace: avatarforge
spec:
  selector:
    app: sadtalker
  ports:
    - port: 8001
