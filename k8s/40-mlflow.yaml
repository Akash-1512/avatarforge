apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: avatarforge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: avatarforge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.13.0
          args:
            - mlflow
            - server
            - --backend-store-uri=sqlite:////mlflow/mlflow.db
            - --artifacts-destination=/mlflow/artifacts
            - --host=0.0.0.0
            - --port=5000
            - --allowed-hosts=mlflow,mlflow:*,localhost,localhost:*,127.0.0.1,127.0.0.1:*
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /mlflow
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 1Gi}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mlflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: avatarforge
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
