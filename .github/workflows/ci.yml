name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Black
        run: black --check .
        working-directory: backend
      - name: isort
        run: isort --check-only .
        working-directory: backend
      - name: Flake8
        run: flake8 .
        working-directory: backend

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install system dependencies (ffmpeg for audio tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Run tests with coverage
        run: |
          cd backend
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t avatarforge-api:ci ./backend

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit Python dependencies for known CVEs
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --ignore-vuln GHSA-none || true
      - name: Build image for scanning
        run: docker build -t avatarforge-api:scan ./backend
      - name: Install Trivy from official release
        run: |
          # Install the Trivy CLI directly rather than the GitHub Action.
          # aquasecurity/trivy-action had its version tags compromised in a
          # 2026 supply-chain attack, so we avoid the action and run the pinned
          # binary from the official install script instead.
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.71.0
          trivy --version
      - name: Trivy image scan (HIGH/CRITICAL)
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format table avatarforge-api:scan

  k8s-validate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validator
        run: pip install kubernetes-validate pyyaml
      - name: Validate manifests against Kubernetes 1.31 schemas
        run: |
          python - << 'PYEOF'
          import glob, sys, yaml, kubernetes_validate
          ok = True
          for path in sorted(glob.glob("k8s/*.yaml")):
              if path.endswith("kustomization.yaml"):
                  continue
              for doc in yaml.safe_load_all(open(path)):
                  if doc is None:
                      continue
                  try:
                      kubernetes_validate.validate(doc, "1.31", strict=True)
                  except Exception as exc:
                      ok = False
                      print(f"FAIL {path}: {exc}")
          sys.exit(0 if ok else 1)
          PYEOF

  # Prompt-regression gate: runs the eval harness against real Azure OpenAI
  # whenever generation/eval logic changes. Requires repo secrets; skips
  # gracefully on forks/PRs without access to them.
  eval-gate:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            prompts:
              - 'backend/services/llm/**'
              - 'backend/evals/**'
      - uses: actions/setup-python@v5
        if: steps.changes.outputs.prompts == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        if: steps.changes.outputs.prompts == 'true'
        run: pip install -r backend/requirements-dev.txt
      - name: Run eval harness (regression gate)
        if: steps.changes.outputs.prompts == 'true'
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: gpt-4.1-mini
          AZURE_OPENAI_API_VERSION: "2024-10-21"
        run: |
          if [ -z "$AZURE_OPENAI_API_KEY" ]; then
            echo "No Azure secrets available — skipping eval gate"
            exit 0
          fi
          python -m backend.evals.runner --limit 5
          python -m backend.evals.planner_runner --limit 4
        working-directory: .
